services:
  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: .
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: ["node", "worker.js"]

  consumer:
    build: .
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: ["node", "consumer.js"]

  producer:
    build: .
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: ["node", "producer.js"]
